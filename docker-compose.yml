name: wiremap
services:
  wiremap:
    build: .
    container_name: wiremap
    ports:
      - "8888:8000"
    volumes:
      # Mount logs directory for persistence
      - ./logs:/app/logs
      # Mount config for easy updates without rebuild
      - ./config:/app/config
      # Mount inventories for persistence across rebuilds
      - ./inventories:/app/inventories
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
